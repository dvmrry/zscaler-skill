<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Source — Zscaler Skill</title>
<style>
  :root {
    --ink: #1a1814;
    --ink-2: #4a4640;
    --ink-3: #8a8680;
    --ink-ghost: #b8b3aa;
    --paper: #f6f2e8;
    --paper-deep: #efeadc;
    --paper-card: #f0eadc;
    --accent: #8a3a1f;
    --accent-ink: #6e2d18;
    --rule: #d8d0c0;
    --warn: #8a3a1f;
  }
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', Georgia, serif; }
  body { margin: 0; }

  .topbar {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.6rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-size: 0.78rem; color: var(--ink-2);
    background: var(--paper);
  }
  .topbar .brand {
    font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    font-size: 0.7rem; color: var(--ink); text-decoration: none;
  }
  .topbar .sep { color: var(--ink-ghost); }
  .topbar .crumbs a { color: var(--ink-2); text-decoration: none; }
  .topbar .crumbs a:hover { color: var(--accent); }
  .topbar .right {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem;
    color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase;
  }
  .topbar .right a { color: var(--ink-3); text-decoration: none; }
  .topbar .right a:hover { color: var(--accent); }

  .layout {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 0;
    min-height: calc(100vh - 38px);
  }

  .sidebar {
    border-right: 1px solid var(--rule);
    background: var(--paper-deep);
    overflow-y: auto;
    padding: 1.5rem 0 3rem;
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-size: 0.82rem;
    /* Sticky height — accounts for the 38px topbar above. The sub-nav
       bar (also 32px) is added on top dynamically by nav.js. */
    position: sticky;
    align-self: start;
    top: 0;
    max-height: 100vh;
  }
  .sidebar h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.66rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--ink-3);
    padding: 0.6rem 1.5rem 0.4rem;
    margin-top: 0.5rem;
  }
  .sidebar h3:first-of-type { margin-top: 0; }
  .sidebar ul { list-style: none; margin: 0 0 0.4rem; padding: 0; }
  .sidebar a {
    display: block;
    padding: 0.25rem 1.5rem;
    color: var(--ink-2); text-decoration: none;
    line-height: 1.35;
    border-left: 2px solid transparent;
    transition: color 0.1s, background 0.1s;
  }
  .sidebar a:hover {
    color: var(--ink); background: var(--paper-card);
  }
  .sidebar a.active {
    color: var(--accent); background: var(--paper);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .sidebar .sb-status {
    padding: 1rem 1.5rem;
    color: var(--ink-3); font-size: 0.74rem;
    font-family: 'IBM Plex Mono', monospace;
  }
  .sidebar .sb-search {
    position: sticky; top: 0; z-index: 1;
    padding: 0.85rem 1.5rem 0.65rem;
    background: var(--paper-deep);
    border-bottom: 1px solid var(--rule);
  }
  .sidebar .sb-search input {
    width: 100%; padding: 0.4rem 0.6rem;
    font-family: 'IBM Plex Sans', sans-serif; font-size: 0.78rem;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--rule); border-radius: 2px;
    -webkit-appearance: none; appearance: none;
  }
  .sidebar .sb-search input:focus {
    outline: none; border-color: var(--accent);
  }
  .sidebar .sb-search-status {
    margin-top: 0.4rem; padding: 0;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.04em; color: var(--ink-3);
    min-height: 0.9rem;
  }
  .sidebar li.no-match { display: none; }
  .sidebar h3.no-match { display: none; }
  .sidebar a .match-badge {
    margin-left: 0.4rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
    color: var(--accent); letter-spacing: 0.02em;
  }

  .page {
    max-width: 48rem;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
    width: 100%;
  }

  .source-banner {
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1.5rem; padding: 0.4rem 0.75rem;
    border: 1px solid var(--rule); border-radius: 2px;
    background: var(--paper-deep);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
    color: var(--ink-3); letter-spacing: 0.04em;
  }
  .source-banner strong { color: var(--ink); text-transform: uppercase; letter-spacing: 0.08em; }
  .source-banner code { color: var(--ink-2); }

  .meta {
    margin-bottom: 2rem; padding: 0.85rem 1.1rem;
    background: var(--paper-deep);
    border-left: 3px solid var(--ink-3);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
    color: var(--ink-2); line-height: 1.7;
  }
  .meta strong { color: var(--ink); font-weight: 500; }
  .meta .meta-row { display: block; }
  .meta .meta-divider { display: inline-block; margin: 0 0.5rem; color: var(--rule); }
  .meta .meta-sources { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--rule); }
  .meta a { color: var(--ink-3); text-decoration: none; }
  .meta a:hover { color: var(--accent); }
  .meta.hidden { display: none; }

  .content h1 { font-size: 2rem; font-weight: 300; line-height: 1.2; margin: 0 0 1.25rem; letter-spacing: -0.01em; }
  .content h2 { font-size: 1.3rem; font-weight: 500; line-height: 1.3; margin: 2.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--rule); }
  .content h3 { font-size: 1.05rem; font-weight: 500; margin: 1.75rem 0 0.5rem; }
  .content h4 { font-size: 0.92rem; font-weight: 600; margin: 1.25rem 0 0.4rem; font-family: 'IBM Plex Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); }
  .content p { margin: 0 0 1rem; line-height: 1.65; }
  .content ul, .content ol { margin: 0 0 1rem; padding-left: 1.4rem; line-height: 1.6; }
  .content li { margin: 0.25rem 0; }
  .content li > p { margin: 0.25rem 0; }
  .content code {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.86em;
    background: rgba(0,0,0,0.05); padding: 0.05em 0.35em; border-radius: 2px;
  }
  .content pre {
    background: var(--paper-deep); padding: 1rem 1.25rem;
    border-left: 3px solid var(--rule); overflow-x: auto;
    font-size: 0.82rem; line-height: 1.55;
    margin: 1.25rem 0;
    font-family: 'IBM Plex Mono', monospace;
  }
  .content pre code { background: none; padding: 0; font-size: inherit; }
  .content table {
    width: 100%; border-collapse: collapse;
    margin: 1.25rem 0; font-size: 0.88rem;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .content th, .content td {
    padding: 0.55rem 0.75rem;
    text-align: left; vertical-align: top;
    border-bottom: 1px solid var(--rule);
  }
  .content th {
    background: var(--paper-deep); font-weight: 500;
    font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--ink-2);
  }
  .content blockquote {
    margin: 1rem 0; padding: 0.5rem 1rem;
    border-left: 3px solid var(--accent);
    background: var(--paper-deep);
    color: var(--ink-2); font-style: italic;
  }
  .content a {
    color: var(--accent); text-decoration: underline;
    text-decoration-thickness: 1px; text-underline-offset: 2px;
  }
  .content a:hover { color: var(--accent-ink); }
  .content hr { border: 0; border-top: 1px solid var(--rule); margin: 2rem 0; }

  .status { color: var(--ink-3); font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; }
  .status.error { color: var(--warn); }

  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      position: static; max-height: none;
      border-right: 0; border-bottom: 1px solid var(--rule);
    }
    .page { padding: 2rem 1.5rem 4rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">Zscaler Skill</a>
  <span class="sep">·</span>
  <span class="crumbs" id="crumbs">Source</span>
  <span class="right" id="github-link"></span>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar" aria-label="Source navigation">
    <div class="sb-search">
      <input type="search" id="sb-search-input" placeholder="Search references" autocomplete="off" spellcheck="false">
      <div class="sb-search-status" id="sb-search-status"></div>
    </div>
    <div id="sb-tree">
      <p class="sb-status">Loading file list…</p>
    </div>
  </aside>

  <main class="page">
    <div class="source-banner" id="source-banner">
      <strong>Source</strong>
      <span>·</span>
      <span>rendered from <code id="banner-path">…</code></span>
    </div>

    <div class="meta hidden" id="meta"></div>

    <article class="content" id="content">
      <p class="status">Loading…</p>
    </article>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="nav.js"></script>
<script>
(function () {
  const REPO = 'dvmrry/zscaler-skill';
  const BRANCH = 'main';
  const RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
  const VIEW = `https://github.com/${REPO}/blob/${BRANCH}`;
  const TREE_API = `https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`;
  const TREE_CACHE_KEY = 'zskill:ref-tree:v1';
  const TREE_CACHE_TTL = 1000 * 60 * 30; // 30 min

  // Friendly labels for the top-level groups in references/.
  const GROUP_LABELS = {
    'zia': 'ZIA',
    'zpa': 'ZPA',
    'zcc': 'ZCC',
    'zdx': 'ZDX',
    'zbi': 'ZBI',
    'zms': 'ZMS',
    'zwa': 'ZWA',
    'zidentity': 'ZIdentity',
    'cloud-connector': 'Cloud Connector',
    'shared': 'Shared',
    'ai-security': 'AI Security',
    'risk360': 'Risk360',
    'deception': 'Deception',
    '_primer': 'Primer',
  };
  // Order in which groups appear in the sidebar.
  const GROUP_ORDER = [
    'zia', 'zpa', 'cloud-connector',
    'zcc', 'zdx', 'zidentity',
    'zbi', 'zwa', 'zms',
    'ai-security', 'risk360', 'deception',
    'shared', '_primer',
  ];

  const params = new URLSearchParams(location.search);
  const rawParam = (params.get('p') || '').trim().replace(/^\/+|\/+$/g, '');

  const candidates = [];
  let displayPath;

  if (!rawParam) {
    candidates.push(`${RAW}/references/_portfolio-map.md`);
    displayPath = 'references/_portfolio-map.md';
  } else if (rawParam.endsWith('.md')) {
    candidates.push(`${RAW}/references/${rawParam}`);
    displayPath = `references/${rawParam}`;
  } else {
    candidates.push(`${RAW}/references/${rawParam}.md`);
    candidates.push(`${RAW}/references/${rawParam}/index.md`);
    displayPath = `references/${rawParam}.md`;
  }

  document.getElementById('banner-path').textContent = displayPath;
  document.title = titleFromSlug(rawParam) + ' — Source';
  renderCrumbs(rawParam);

  // Kick off the file-tree fetch in parallel with the markdown fetch.
  loadTree().then(renderSidebar).catch(err => {
    document.getElementById('sidebar').innerHTML =
      `<p class="sb-status">Could not load file list.<br><small>${escapeHtml(err.message)}</small></p>`;
  });

  fetchFirst(candidates).then(({ url, text }) => {
    if (!text) {
      showError(`Could not load source. Tried:\n${candidates.join('\n')}`);
      return;
    }
    const fetchedRel = url.replace(`${RAW}/`, '');
    document.getElementById('banner-path').textContent = fetchedRel;
    setGithubLink(fetchedRel);

    const { fm, body } = parseFrontmatter(text);
    if (fm.title) document.title = `${fm.title} — Source`;
    renderMeta(fm);
    renderBody(body, dirOf(fetchedRel.replace(/^references\//, '')));
  }).catch(err => {
    showError(`Error loading source: ${err.message}`);
  });

  // ── Markdown loading ──────────────────────────────────────────────

  async function fetchFirst(urls) {
    for (const u of urls) {
      try {
        const r = await fetch(u);
        if (r.ok) return { url: u, text: await r.text() };
      } catch (_) { /* try next */ }
    }
    return { url: null, text: null };
  }

  function dirOf(relPath) {
    const idx = relPath.lastIndexOf('/');
    return idx === -1 ? '' : relPath.slice(0, idx);
  }

  function parseFrontmatter(text) {
    if (!text.startsWith('---\n') && !text.startsWith('---\r\n')) {
      return { fm: {}, body: text };
    }
    const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
    if (!m) return { fm: {}, body: text };
    return { fm: parseSimpleYaml(m[1]), body: m[2] };
  }

  function parseSimpleYaml(text) {
    const out = {};
    let currentKey = null;
    for (const rawLine of text.split('\n')) {
      const line = rawLine.replace(/\r$/, '');
      if (!line.trim() || line.trim().startsWith('#')) continue;
      const list = line.match(/^\s+-\s+(.+)$/);
      if (list && currentKey) {
        if (!Array.isArray(out[currentKey])) out[currentKey] = [];
        out[currentKey].push(stripQuotes(list[1].trim()));
        continue;
      }
      const kv = line.match(/^([A-Za-z][A-Za-z0-9_-]*)\s*:\s*(.*)$/);
      if (kv) {
        currentKey = kv[1];
        const val = kv[2].trim();
        if (val === '') out[currentKey] = '';
        else if (val === '[]') out[currentKey] = [];
        else if (val === '{}') out[currentKey] = {};
        else out[currentKey] = stripQuotes(val);
      }
    }
    return out;
  }

  function stripQuotes(s) { return s.replace(/^["']|["']$/g, ''); }

  // ── Tree / sidebar ────────────────────────────────────────────────

  async function loadTree() {
    const cached = readCachedTree();
    if (cached) return cached;
    const r = await fetch(TREE_API, { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!r.ok) throw new Error(`tree API ${r.status}`);
    const data = await r.json();
    // Keep entries as paths (strings) for backwards compatibility with
    // hub-topics.js / nav.js that read the same cache. SHAs are stored
    // separately and only used by the search content cache.
    const entries = (data.tree || [])
      .filter(e => e.type === 'blob' && e.path.startsWith('references/') && e.path.endsWith('.md'))
      .map(e => e.path.slice('references/'.length));
    const shas = {};
    for (const e of (data.tree || [])) {
      if (e.type === 'blob' && e.path.startsWith('references/') && e.path.endsWith('.md')) {
        shas[e.path.slice('references/'.length)] = e.sha;
      }
    }
    try {
      localStorage.setItem(TREE_CACHE_KEY, JSON.stringify({ ts: Date.now(), entries }));
      localStorage.setItem(TREE_CACHE_KEY + ':shas', JSON.stringify(shas));
    } catch (_) { /* ignore quota */ }
    treeShas = shas;
    return entries;
  }
  let treeShas = (() => {
    try { return JSON.parse(localStorage.getItem(TREE_CACHE_KEY + ':shas') || '{}'); }
    catch (_) { return {}; }
  })();

  function readCachedTree() {
    try {
      const raw = localStorage.getItem(TREE_CACHE_KEY);
      if (!raw) return null;
      const { ts, entries } = JSON.parse(raw);
      if (Date.now() - ts > TREE_CACHE_TTL) return null;
      return entries;
    } catch (_) { return null; }
  }

  function renderSidebar(entries) {
    if (!entries || !entries.length) {
      document.getElementById('sidebar').innerHTML =
        '<p class="sb-status">No reference files found.</p>';
      return;
    }

    // Group entries: top-level files vs subdir files. Skip *.md inside
    // _primer when we want; show them under Primer.
    const groups = {};   // groupKey → [ {path, label} ]
    const topLevel = []; // files directly under references/

    for (const path of entries) {
      const parts = path.split('/');
      if (parts.length === 1) {
        topLevel.push({ path, label: prettify(parts[0].replace(/\.md$/, '')) });
      } else {
        const group = parts[0];
        if (!groups[group]) groups[group] = [];
        const fileLabel = parts.slice(1).join('/').replace(/\.md$/, '');
        groups[group].push({ path, label: prettify(fileLabel) });
      }
    }

    // Sort each group: index first, then alpha by label.
    for (const k of Object.keys(groups)) {
      groups[k].sort((a, b) => {
        if (a.path.endsWith('/index.md')) return -1;
        if (b.path.endsWith('/index.md')) return 1;
        return a.label.localeCompare(b.label);
      });
    }
    topLevel.sort((a, b) => a.label.localeCompare(b.label));

    // Active path: drop .md and the references/ prefix to compare with `?p=` slugs.
    const currentSlug = currentSlugFromUrl();

    const html = [];

    if (topLevel.length) {
      html.push(`<h3>References</h3><ul>`);
      for (const f of topLevel) {
        const slug = f.path.replace(/\.md$/, '');
        html.push(renderSidebarItem(slug, f.label, currentSlug, f.path));
      }
      html.push(`</ul>`);
    }

    const orderedKeys = [
      ...GROUP_ORDER.filter(k => groups[k]),
      ...Object.keys(groups).filter(k => !GROUP_ORDER.includes(k)).sort(),
    ];

    for (const key of orderedKeys) {
      const label = GROUP_LABELS[key] || prettify(key);
      html.push(`<h3>${escapeHtml(label)}</h3><ul>`);
      for (const f of groups[key]) {
        const slug = f.path.replace(/\.md$/, '').replace(/\/index$/, '');
        const displayLabel = f.path.endsWith('/index.md') ? 'Overview' : f.label;
        html.push(renderSidebarItem(slug, displayLabel, currentSlug, f.path));
      }
      html.push(`</ul>`);
    }

    document.getElementById('sb-tree').innerHTML = html.join('');
    setupSearch(entries);
  }

  function renderSidebarItem(slug, label, currentSlug, path) {
    const isActive = slug === currentSlug;
    const cls = isActive ? ' class="active"' : '';
    const dataPath = path ? ` data-path="${escapeHtml(path)}"` : '';
    return `<li><a href="?p=${encodePath(slug)}"${cls}${dataPath}>${escapeHtml(label)}</a></li>`;
  }

  function currentSlugFromUrl() {
    const p = (new URLSearchParams(location.search).get('p') || '').trim()
      .replace(/^\/+|\/+$/g, '').replace(/\.md$/, '');
    if (!p) return '_portfolio-map';
    return p;
  }

  // ── Search ────────────────────────────────────────────────────────
  // Two-stage filter: instant title/path match, with content match
  // layered on once each file's body has been fetched. Bodies are
  // fetched lazily in the background after the page settles, keyed by
  // file SHA in localStorage so we don't re-fetch unchanged content.

  const CONTENT_KEY_PREFIX = 'zskill:content:v1:';

  function setupSearch(entries) {
    const input = document.getElementById('sb-search-input');
    const status = document.getElementById('sb-search-status');
    if (!input || !status) return;

    const contentCache = {}; // path → lowercased body text
    let indexed = 0;
    let totalToIndex = 0;

    // Hydrate from localStorage for files whose SHA matches the current tree
    for (const path of entries) {
      const sha = treeShas[path];
      if (!sha) continue;
      try {
        const cached = localStorage.getItem(CONTENT_KEY_PREFIX + sha);
        if (cached !== null) {
          contentCache[path] = cached;
          indexed++;
        }
      } catch (_) {}
    }
    totalToIndex = entries.length;
    updateStatus();

    // Background-fetch missing files. Stagger lightly to be a polite
    // citizen of raw.githubusercontent.com.
    setTimeout(() => loadAllContent(entries), 250);

    async function loadAllContent(entries) {
      for (const path of entries) {
        if (contentCache[path] !== undefined) continue;
        try {
          const r = await fetch(`${RAW}/references/${path}`);
          if (!r.ok) continue;
          const text = await r.text();
          // Strip frontmatter and lowercase for cheap indexOf matching.
          const body = text.replace(/^---\r?\n[\s\S]*?\r?\n---\r?\n/, '').toLowerCase();
          contentCache[path] = body;
          indexed++;
          const sha = treeShas[path];
          if (sha) {
            try { localStorage.setItem(CONTENT_KEY_PREFIX + sha, body); }
            catch (_) { /* storage full — skip persistence */ }
          }
          if (indexed % 5 === 0) updateStatus();
          await new Promise(res => setTimeout(res, 25));
        } catch (_) { /* skip and continue */ }
      }
      updateStatus();
      // If a query is in progress, re-run it so newly-indexed files appear.
      if (input.value.trim()) onInput();
    }

    function updateStatus() {
      if (indexed >= totalToIndex) {
        status.textContent = '';
      } else {
        status.textContent = `Indexing ${indexed}/${totalToIndex}…`;
      }
    }

    function onInput() {
      const q = input.value.trim().toLowerCase();
      const links = document.querySelectorAll('#sb-tree li a');
      const headers = document.querySelectorAll('#sb-tree h3');

      if (!q) {
        links.forEach(a => a.parentElement.classList.remove('no-match'));
        headers.forEach(h => h.classList.remove('no-match'));
        // Clear match badges
        document.querySelectorAll('.match-badge').forEach(b => b.remove());
        return;
      }

      const visibleLists = new Set();

      links.forEach(a => {
        const path = a.dataset.path;
        const labelText = a.textContent.toLowerCase();

        // Existing badge needs to go before we recompute
        const existingBadge = a.querySelector('.match-badge');
        if (existingBadge) existingBadge.remove();

        const titleMatch = labelText.includes(q);
        const body = contentCache[path];
        const contentMatch = body !== undefined && body.includes(q);

        const matches = titleMatch || contentMatch;
        a.parentElement.classList.toggle('no-match', !matches);

        if (matches) {
          if (!titleMatch && contentMatch) {
            // Indicate this match came from body content, not the label.
            const badge = document.createElement('span');
            badge.className = 'match-badge';
            badge.textContent = '·';
            badge.title = 'matches in body text';
            a.appendChild(badge);
          }
          const list = a.closest('ul');
          if (list) visibleLists.add(list);
        }
      });

      // Hide section headers whose list has no visible items
      headers.forEach(h => {
        const next = h.nextElementSibling;
        const visible = next && visibleLists.has(next);
        h.classList.toggle('no-match', !visible);
      });
    }

    input.addEventListener('input', onInput);
  }

  function prettify(s) {
    return s.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function encodePath(p) {
    return p.split('/').map(encodeURIComponent).join('/');
  }

  // ── UI bits ───────────────────────────────────────────────────────

  function renderCrumbs(p) {
    const el = document.getElementById('crumbs');
    if (!p) { el.textContent = 'Source'; return; }
    const parts = p.split('/');
    const links = parts.map((seg, i) => {
      const sub = parts.slice(0, i + 1).join('/');
      const isLast = i === parts.length - 1;
      if (isLast) return `<span style="color: var(--ink);">${escapeHtml(seg)}</span>`;
      return `<a href="?p=${encodePath(sub)}">${escapeHtml(seg)}</a>`;
    });
    el.innerHTML = `<a href="?p=">Source</a>` + ' › ' + links.join(' › ');
  }

  function setGithubLink(rel) {
    const el = document.getElementById('github-link');
    el.innerHTML = `<a href="${VIEW}/${rel}" target="_blank" rel="noopener">View on GitHub ↗</a>`;
  }

  function renderMeta(fm) {
    const el = document.getElementById('meta');
    if (!fm || Object.keys(fm).length === 0) { el.classList.add('hidden'); return; }
    const fields = [];
    if (fm['last-verified']) fields.push(`<strong>Verified</strong> ${escapeHtml(fm['last-verified'])}`);
    if (fm.confidence) fields.push(`<strong>Confidence</strong> ${escapeHtml(fm.confidence)}`);
    if (fm['source-tier']) fields.push(`<strong>Tier</strong> ${escapeHtml(fm['source-tier'])}`);
    if (fm['content-type']) fields.push(`<strong>Type</strong> ${escapeHtml(fm['content-type'])}`);
    if (fm['author-status']) fields.push(`<strong>Status</strong> ${escapeHtml(fm['author-status'])}`);

    let html = '';
    if (fields.length) {
      html += `<span class="meta-row">${fields.join('<span class="meta-divider">·</span>')}</span>`;
    }
    const sourcesRaw = Array.isArray(fm.sources) ? fm.sources : [];
    const sources = sourcesRaw.filter(s => typeof s === 'string' && s.startsWith('http'));
    if (sources.length) {
      const links = sources.map(s => `<a href="${escapeAttr(s)}" target="_blank" rel="noopener">${escapeHtml(shortenUrl(s))}</a>`).join('<br>');
      html += `<div class="meta-sources"><strong>Sources</strong><br>${links}</div>`;
    }
    if (!html) { el.classList.add('hidden'); return; }
    el.innerHTML = html;
    el.classList.remove('hidden');
  }

  function shortenUrl(u) {
    try { const x = new URL(u); return x.hostname + x.pathname; } catch { return u; }
  }

  function renderBody(md, currentDir) {
    marked.use({
      walkTokens(token) {
        if ((token.type === 'link' || token.type === 'image') && token.href) {
          token.href = rewriteHref(token.href, currentDir);
        }
      },
    });
    const html = marked.parse(md);
    document.getElementById('content').innerHTML = html;
  }

  function rewriteHref(href, currentDir) {
    if (/^(https?:|mailto:|tel:|#|data:)/i.test(href)) return href;
    if (href.startsWith('/')) return href;
    const m = href.match(/^(.+?)\.md(#.*)?$/);
    if (!m) return href;
    const target = resolvePath(currentDir, m[1]);
    const anchor = m[2] || '';
    return `?p=${encodePath(target)}${anchor}`;
  }

  function resolvePath(base, rel) {
    const baseSegs = base ? base.split('/').filter(Boolean) : [];
    const relSegs = rel.split('/').filter(s => s !== '');
    const segs = [...baseSegs];
    for (const s of relSegs) {
      if (s === '.') continue;
      if (s === '..') segs.pop();
      else segs.push(s);
    }
    return segs.join('/');
  }

  function titleFromSlug(slug) {
    if (!slug) return 'Source';
    const last = slug.split('/').pop().replace(/\.md$/, '');
    if (!last) return slug;
    return last.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function showError(msg) {
    const el = document.getElementById('content');
    el.innerHTML = `<p class="status error">${escapeHtml(msg)}</p>`;
  }
})();
</script>

</body>
</html>
