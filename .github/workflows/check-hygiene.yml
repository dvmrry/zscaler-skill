name: Doc hygiene

# Runs the doc-hygiene check suite:
#   - check-hygiene.py:          frontmatter, anchors, clarification propagation, evals
#   - check-citations.sh:        markdown link path resolution in references/**
#   - check-doc-links.py:        HTML link / asset path resolution in docs/**
#   - check-orphans.py:          reference files with no inbound links from anywhere
#   - check-vendor-drift.py:     refs whose cited vendor sources may have drifted
#                                (advisory — exits 1 only on confirmed file changes)
#   - check-scrape-freshness.py: stale Zscaler help-article scrapes
#                                (advisory — exit 0 unless --strict)
#
# Errors fail the build; warnings are advisory and don't block.
#
# Triggers:
#   - PRs touching references/, evals/, docs/, vendor submodules, or the scripts
#   - Pushes to main on the same paths
#   - Weekly Monday cron (catches drift from upstream PRs / external edits)
#   - workflow_dispatch for manual runs

on:
  pull_request:
    paths:
      - 'references/**'
      - 'references/_meta/evals/**'
      - 'docs/**'
      - '.gitmodules'
      - 'vendor/**'
      - 'scripts/check-hygiene.py'
      - 'scripts/check-citations.sh'
      - 'scripts/check-doc-links.py'
      - 'scripts/check-orphans.py'
      - 'scripts/check-vendor-drift.py'
      - 'scripts/check-scrape-freshness.py'
  push:
    branches: [main]
    paths:
      - 'references/**'
      - 'references/_meta/evals/**'
      - 'docs/**'
      - '.gitmodules'
      - 'vendor/**'
      - 'scripts/check-hygiene.py'
      - 'scripts/check-citations.sh'
      - 'scripts/check-doc-links.py'
      - 'scripts/check-orphans.py'
      - 'scripts/check-vendor-drift.py'
      - 'scripts/check-scrape-freshness.py'
  schedule:
    # Mondays 13:00 UTC — aligns with issue-watch + Renovate cadence
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Initialize submodules
        # Vendor submodules are referenced by ref-doc citations
        # (e.g. references/zia/locations.md → ../../vendor/...) and by
        # check-vendor-drift.py. CI doesn't init submodules by default;
        # do it once up front so every check below can see them.
        run: git submodule update --init --recursive

      - name: Set up uv
        # setup-uv does not ship a `v8` major-version tag — only specific
        # versions (v8.0.0, v8.1.0, ...). Pin to a concrete version.
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run hygiene checks
        run: ./scripts/check-hygiene.py

      - name: Check for broken markdown citations in references/
        run: ./scripts/check-citations.sh

      - name: Check for broken HTML links in docs/
        run: ./scripts/check-doc-links.py

      - name: Check for orphan reference files
        run: ./scripts/check-orphans.py

      - name: Check for vendor-source drift
        run: ./scripts/check-vendor-drift.py

      - name: Check Zscaler help-article scrape freshness (advisory)
        run: ./scripts/check-scrape-freshness.py
